	.liquid-glass-btn {
  position: relative;
  overflow: hidden;
  isolation: isolate;
}

.liquid-glass-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      120% 80% at 120% 50%,
      rgba(255,255,255,0.35),
      rgba(255,255,255,0.12) 40%,
      rgba(255,255,255,0.05) 60%,
      transparent 70%
    );
  filter: blur(8px);
  transform: translateX(40%);
  animation: liquidFlow 6s cubic-bezier(.4,0,.2,1) infinite;
  pointer-events: none;
  z-index: 1;
}

.liquid-glass-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      110deg,
      transparent 30%,
      rgba(255,255,255,0.45) 50%,
      transparent 70%
    );
  opacity: 0.35;
  transform: translateX(60%);
  animation: liquidHighlight 6s cubic-bezier(.4,0,.2,1) infinite;
  pointer-events: none;
  z-index: 2;
}

@keyframes liquidFlow {
  0% {
    transform: translateX(60%);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  60% {
    opacity: 0.8;
  }
  100% {
    transform: translateX(-60%);
    opacity: 0;
  }
}

@keyframes liquidHighlight {
  0% {

    opacity: 0;
  }

  100% {
    transform: translateX(-70%);

}
